<div class="comments-section mt-5">
    <h4 class="mb-4">💬 Comments</h4>
    
    <!-- Add Comment Form -->
    {% if user.is_authenticated %}
        <div class="comment-form-wrapper mb-4" style="background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px;">
            <form method="POST" action="{% url 'add_comment' media_id=media_id media_type=media_type %}">
                {% csrf_token %}
                <div class="mb-2">
                    <textarea name="content" rows="3" 
                              class="form-control" 
                              style="background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 10px; padding: 12px; width: 100%; resize: vertical;"
                              placeholder="Write your comment..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary-custom" style="padding: 8px 24px; font-size: 14px;">
                    Post Comment
                </button>
            </form>
        </div>
    {% else %}
        <div class="comment-form-wrapper mb-4" style="background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; text-align: center;">
            <p class="text-secondary-custom mb-0">
                <a href="{% url 'login' %}" style="color: var(--primary);">Login</a> to post a comment
            </p>
        </div>
    {% endif %}
    
    <!-- Comments List -->
    <div id="comments-list">
        <div class="text-center py-3" id="comments-loading">
            <span class="text-secondary-custom">Loading comments...</span>
        </div>
    </div>
</div>

<script>
    // Load comments when page loads
    document.addEventListener('DOMContentLoaded', function() {
        loadComments();
    });
    
    function loadComments() {
        const mediaId = '{{ media_id }}';
        const mediaType = '{{ media_type }}';
        const commentsList = document.getElementById('comments-list');
        const loading = document.getElementById('comments-loading');
        
        if (!commentsList) return;
        
        fetch(`/tracking/comment/get/${mediaId}/${mediaType}/`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                if (loading) loading.remove();
                
                if (data.comments.length === 0) {
                    commentsList.innerHTML = `
                        <div style="background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; text-align: center;">
                            <p class="text-secondary-custom mb-0">No comments yet. Be the first to comment!</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                data.comments.forEach(comment => {
                    const isOwner = comment.is_owner || false;
                    html += `
                        <div class="comment-item" style="background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 12px;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div>
                                    <strong style="color: var(--text-primary);">${comment.username}</strong>
                                    <span style="color: var(--text-muted); font-size: 12px; margin-left: 10px;">${comment.created_at}</span>
                                </div>
                                ${isOwner ? `
                                    <button onclick="deleteComment(${comment.id})" style="background: none; border: none; color: #EF4444; cursor: pointer; font-size: 14px; transition: 0.2s;" onmouseover="this.style.color='#DC2626'" onmouseout="this.style.color='#EF4444'">
                                        🗑️ Delete
                                    </button>
                                ` : ''}
                            </div>
                            <div style="color: var(--text-primary); margin-top: 8px; word-wrap: break-word;">
                                ${comment.content}
                            </div>
                        </div>
                    `;
                });
                commentsList.innerHTML = html;
            } else {
                if (loading) loading.remove();
                commentsList.innerHTML = `
                    <div style="background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; text-align: center;">
                        <p class="text-secondary-custom mb-0">Error loading comments.</p>
                    </div>
                `;
            }
        })
        .catch(error => {
            console.error('Error loading comments:', error);
            if (loading) loading.remove();
            commentsList.innerHTML = `
                <div style="background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; text-align: center;">
                    <p class="text-secondary-custom mb-0">Error loading comments.</p>
                </div>
            `;
        });
    }
    
    function deleteComment(commentId) {
        if (!confirm('Are you sure you want to delete this comment?')) return;
        
        fetch(`/tracking/comment/delete/${commentId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Reload comments
                loadComments();
            } else {
                alert('Error: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error deleting comment');
        });
    }
</script>
