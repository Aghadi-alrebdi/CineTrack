{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="app-wrapper p-4">
                <h2 class="text-center mb-4">Login</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control search-box" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control search-box" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100">
                        Login
                    </button>
                </form>
                
                <p class="text-center mt-3 text-secondary-custom">
                    Don't have an account? 
                    <a href="{% url 'register' %}" class="text-primary">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
